{% extends "base.html" %}

{% block title %}Inscription{% endblock %}

{% block page_content %}
<div class="auth-page d-flex justify-content-center align-items-center">
  <div class="auth-card">
    <h1>Inscription</h1>
    <p class="text-small mb-4">Créez un compte pour consulter les matériels et les photos du projet.</p>

    <form method="POST">
    <div class="form-group">
      <label for="username">Nom d’utilisateur</label>
      <input type="text" class="form-control" id="username" name="username" required>
    </div>
    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input type="password" class="form-control" id="password" name="password" required>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Créer mon compte</button>
  </form>

  <p class="mt-4 mb-0">Déjà inscrit ? <a href="{{ url_for('login') }}">Connectez-vous</a></p>
  </div>
</div>
{% endblock %}
